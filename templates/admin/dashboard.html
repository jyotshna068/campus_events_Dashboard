{% extends "base.html" %}
{% block content %}

<h2>Admin Dashboard</h2>

<div class="row">

<div class="col-md-4"><div class="card custom-card p-3">
<h3>{{ total_users }}</h3><p>Users</p>
</div></div>

<div class="col-md-4"><div class="card custom-card p-3">
<h3>{{ total_events }}</h3><p>Events</p>
</div></div>

<div class="col-md-4"><div class="card custom-card p-3">
<h3>{{ total_registrations }}</h3><p>Registrations</p>
</div></div>

</div>

<h4 class="mt-4">Pending Organizers</h4>

<table class="table table-dark table-hover">
<tr><th>Name</th><th>Email</th><th>Action</th></tr>

{% for o in pending_organizers %}
<tr>
<td>{{ o.name }}</td>
<td>{{ o.email }}</td>
<td>
<a href="/admin/approve-organizer/{{ o.id }}" class="btn btn-success btn-sm">Approve</a>
<a href="/admin/reject-organizer/{{ o.id }}" class="btn btn-danger btn-sm">Reject</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
