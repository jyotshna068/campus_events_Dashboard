{% extends "base.html" %}

{% block content %}

<h2>Edit Event</h2>

<form method="POST">

<div class="mb-3">

<label>Title</label>

<input
type="text"
name="title"
class="form-control"
value="{{ event.title }}"
required
>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"
required
>{{ event.description }}</textarea>

</div>

<div class="mb-3">

<label>Category</label>

<input
type="text"
name="category"
class="form-control"
value="{{ event.category }}"
required
>

</div>

<div class="mb-3">

<label>Venue</label>

<input
type="text"
name="venue"
class="form-control"
value="{{ event.venue }}"
required
>

</div>

<button
class="btn btn-primary"
>
Update Event
</button>

</form>

{% endblock %}
