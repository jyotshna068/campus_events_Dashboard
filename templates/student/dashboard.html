{% extends "base.html" %}
{% block content %}

<h2>My Events</h2>

<div class="row">

{% for event in events %}

<div class="col-md-4">

<div class="card custom-card p-3">

<h5>{{ event.title }}</h5>
<p>{{ event.venue }}</p>
<p>{{ event.date }}</p>

<a href="/event/{{ event.id }}" class="btn btn-primary btn-sm">View</a>
<a href="/certificates/generate/{{ event.id }}" class="btn btn-warning btn-sm">Certificate</a>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
