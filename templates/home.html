{% extends "base.html" %}
{% block content %}

<h2>Upcoming Campus Events</h2>

<div class="row mt-3">

{% for event in events %}

<div class="col-md-4 mb-4">

<div class="card custom-card">

{% if event.image %}
<img src="{{ url_for('static', filename='uploads/' + event.image) }}" class="card-img-top">
{% endif %}

<div class="card-body">

<h5>{{ event.title }}</h5>
<p>{{ event.category }}</p>
<p>{{ event.venue }}</p>

<a href="/event/{{ event.id }}" class="btn btn-primary">View</a>

</div>
</div>

</div>

{% endfor %}

</div>

{% endblock %}
