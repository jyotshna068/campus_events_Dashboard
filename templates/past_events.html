{% extends "base.html" %}

{% block content %}

<h2>
Past Events Gallery
</h2>

<div class="row">

{% for event in events %}

<div class="col-md-4 mb-4">

<div class="card shadow">

{% if event.image %}

<img
src="{{ url_for(
'static',
filename='uploads/' + event.image
) }}"
class="card-img-top"
>

{% endif %}

<div class="card-body">

<h5>

{{ event.title }}

</h5>

<p>

{{ event.club_name }}

</p>

<p>

{{ event.date }}

</p>

<a
href="/event/{{ event.id }}"
class="btn btn-primary"
>
View Memories
</a>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
