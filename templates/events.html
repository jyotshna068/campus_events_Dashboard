{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
Upcoming Events
</h2>

<form method="GET">

<div class="row mb-4">

<div class="col-md-4">

<input
type="text"
name="search"
class="form-control"
placeholder="Search Event"
>

</div>

<div class="col-md-3">

<select
name="category"
class="form-control"
>

<option value="">
All Categories
</option>

<option>
Technical
</option>

<option>
Workshop
</option>

<option>
Sports
</option>

<option>
Cultural
</option>

</select>

</div>

<div class="col-md-3">

<input
type="text"
name="club"
class="form-control"
placeholder="Club Name"
>

</div>

<div class="col-md-2">

<button
class="btn btn-primary w-100"
>
Filter
</button>

</div>

</div>

</form>

<div class="row">

{% for event in events %}

<div class="col-md-4 mb-4">

    <div class="card shadow">

        <div class="card-body">

            <h5>
                {{ event.title }}
            </h5>

            <p>
                {{ event.category }}
            </p>

            <p>
                {{ event.date }}
            </p>

            <a
                href="/event/{{ event.id }}"
                class="btn btn-outline-primary"
            >
                View Details
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
