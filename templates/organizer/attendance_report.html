{% extends "base.html" %}

{% block content %}

<h2>
Attendance Report
</h2>

<table
class="table table-bordered"
>

<thead>

<tr>

<th>
Student ID
</th>

<th>
Check In Time
</th>

</tr>

</thead>

<tbody>

{% for record in attendance %}

<tr>

<td>
{{ record.student_id }}
</td>

<td>
{{ record.check_in_time }}
</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
