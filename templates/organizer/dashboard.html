{% extends "base.html" %}
{% block content %}

<h2>Organizer Dashboard</h2>

<a href="/organizer/create-event" class="btn btn-success mb-3">Create Event</a>

<div class="row">

{% for event in events %}

<div class="col-md-4">

<div class="card custom-card p-3">

<h5>{{ event.title }}</h5>
<p>{{ event.venue }}</p>
<p>{{ event.date }}</p>

<a href="/organizer/edit-event/{{ event.id }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/organizer/delete-event/{{ event.id }}" class="btn btn-danger btn-sm">Delete</a>

<a href="/organizer/registrations/{{ event.id }}" class="btn btn-primary btn-sm">Registrations</a>

<a href="/attendance/generate/{{ event.id }}" class="btn btn-success btn-sm">QR</a>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
