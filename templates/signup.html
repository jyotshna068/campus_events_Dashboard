{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-header text-center">
                <h3>Create Account</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label>Name</label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>Role</label>

                        <select
                            name="role"
                            class="form-control"
                            required
                        >

                            <option value="student">
                                Student
                            </option>

                            <option value="organizer">
                                Club Organizer
                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >
                        Sign Up
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
