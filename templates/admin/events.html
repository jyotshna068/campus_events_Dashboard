{% extends "base.html" %}
{% block content %}

<h2>Manage Events</h2>

<table class="table table-dark table-hover">

<tr>
<th>Title</th>
<th>Category</th>
<th>Venue</th>
<th>Action</th>
</tr>

{% for e in events %}
<tr>
<td>{{ e.title }}</td>
<td>{{ e.category }}</td>
<td>{{ e.venue }}</td>
<td>
<a href="/admin/delete-event/{{ e.id }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
